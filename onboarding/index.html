<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>OC | Partner Onboarding</title>

    <link rel="stylesheet" href="/style.css" />
    <link rel="icon" href="/img/icons/favicon.ico" />
  </head>

  <body>
    <!-- NAV -->
    <div id="navigation" class="flexColumnCenterCenter"></div>

    <!-- ONBOARDING FORM -->
    <div class="fullWidth flexColumnCenterCenter colorSetA">
      <div class="container">
        <div class="onboarding flexColumnCenter">
          <h1>Partner Onbaording</h1>
          <p>
            Damit du ein Organic Concpets Partner werden kannst, brauchen wir
            ein paar Informationen zu deinem Unternehmen von dir. Bitte achte
            darauf, die Daten exakt richtig anzugeben. Daraufhin können wir
            schnell und effektiv mit dir zusammen arbeiten.
          </p>
          <form id="contactForm">
            <div class="form-group">
              <input
                type="text"
                id="company"
                name="company"
                placeholder="Unternehmensname"
                required
              />
            </div>
            <div class="form-group">
              <input
                type="text"
                id="street"
                name="street"
                placeholder="Straße"
                required
              />
            </div>
            <div class="form-group">
              <input
                type="text"
                id="houseNumber"
                name="houseNumber"
                placeholder="Hausnummer"
                required
              />
            </div>
            <div class="form-group">
              <input
                type="text"
                id="postalCode"
                name="postalCode"
                placeholder="Postleitzahl"
                required
              />
            </div>
            <div class="form-group">
              <input
                type="text"
                id="city"
                name="city"
                placeholder="Stadt"
                required
              />
            </div>
            <div class="form-group">
              <input
                type="email"
                id="email"
                name="email"
                placeholder="E-Mail"
                required
              />
            </div>
            <div class="form-group">
              <input
                type="tel"
                id="phone"
                name="phone"
                placeholder="Telefon / Mobil"
                required
              />
            </div>
            <div class="form-group">
              <input
                type="url"
                id="website"
                name="website"
                placeholder="Website"
              />
            </div>
            <button type="submit" class="submit-btn">Absenden</button>
          </form>
        </div>
      </div>
    </div>

    <div id="footer" class="container"></div>

    <!-- SCRIPTS -->
    <script src="/script/importCode.js"></script>
    <script src="/script/redirect.js"></script>
    <script src="/script/animation.js"></script>
    <script src="/script/onboarding.js"></script>
  </body>
</html>
