<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>OC | Kontakt</title>

    <link rel="stylesheet" href="/style.css" />
    <link rel="icon" href="/img/icons/favicon.ico" />
  </head>

  <body>
    <div id="navigation" class="flexColumnCenterCenter"></div>

    <div class="fullWidth flexColumnCenterCenter colorSetA">
      <div class="container">
        <div class="contact flexColumnCenter" style="min-height: 60vh">
          <h1>Kontakt</h1>
          <form id="contactForm">
            <div class="form-group">
              <input
                type="text"
                id="vorname"
                name="vorname"
                placeholder="Vorname"
                required
              />
            </div>
            <div class="form-group">
              <input
                type="text"
                id="nachname"
                name="nachname"
                placeholder="Nachname"
                required
              />
            </div>
            <div class="form-group">
              <input
                type="email"
                id="email"
                name="email"
                placeholder="E-Mail"
                required
              />
            </div>
            <div class="form-group">
              <input
                type="tel"
                id="mobil"
                name="mobil"
                placeholder="Mobilnummer"
              />
            </div>
            <div class="form-group">
              <textarea
                name="message"
                id="message"
                placeholder="Nachricht"
                rows="5"
                required
              ></textarea>
            </div>
            <button type="submit" class="submit-btn">Absenden</button>
          </form>
        </div>
      </div>
    </div>

    <div id="footer" class="container"></div>

    <!-- SCRIPTS -->
    <script src="/script/importCode.js"></script>
    <script src="/script/redirect.js"></script>
    <script src="/script/animation.js"></script>
    <script src="/script/cart.js"></script>
  </body>
</html>
