<div id="custom-cookie-banner" class="cookie-hidden">
  <div class="cookie-content">
    <div class="cookie-text">
      <h3>Cookie-Einstellungen</h3>
      <p style="margin-bottom: 10px">
        Aktuelle Auswahl:
        <span
          id="current-consent-display"
          style="font-weight: bold; color: #fff"
          >Keine</span
        >
      </p>
      <p>
        Wir nutzen Cookies, um dein Erlebnis zu verbessern. Details findest du
        in unserer <a href="/privacy">Datenschutzerklärung</a>.
      </p>
    </div>
    <div class="cookie-buttons">
      <button onclick="acceptCookies()" class="btn-accept">
        Alle akzeptieren
      </button>
      <button onclick="rejectCookies()" class="btn-reject">
        Nur notwendige
      </button>
    </div>
  </div>
</div>

<button
  id="cookie-settings-trigger"
  onclick="showCookieBanner()"
  title="Cookie-Einstellungen ändern"
>
  <img src="/assets/media/icons/fingerprint.png" alt="Cookies" />
</button>
